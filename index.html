<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>결제 지시서 — 결제 직전, 뭘 꺼낼지 알려드려요</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<div class="app">
  <header class="site-header">
    <button type="button" class="logo-btn" data-page="home" aria-label="홈으로">
      결제 <span class="hl">지시서</span>
    </button>
    <button type="button" class="menu-btn" id="menuBtn" aria-label="메뉴 열기" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
  </header>

  <div class="menu-backdrop" id="drawerBackdrop" hidden></div>
  <aside class="menu-panel" id="drawer" aria-label="주요 메뉴" aria-hidden="true">
    <div class="menu-panel-head">
      <strong>메뉴</strong>
      <button type="button" class="drawer-close" id="drawerClose" aria-label="메뉴 닫기">✕</button>
    </div>
    <nav class="drawer-nav">
      <button type="button" data-page="home" class="on">
        <span class="nav-ico">🏠</span>
        <span>
          <b>홈</b>
          <small>서비스 소개</small>
        </span>
      </button>
      <button type="button" data-page="mypage">
        <span class="nav-ico">👤</span>
        <span>
          <b>마이페이지</b>
          <small>로그인 · 카드 관리</small>
        </span>
      </button>
      <button type="button" data-page="benefits">
        <span class="nav-ico">✨</span>
        <span>
          <b>혜택 추천</b>
          <small>지도 · 결제 계산</small>
        </span>
      </button>
      <button type="button" data-page="more">
        <span class="nav-ico">💬</span>
        <span>
          <b>추가 기능</b>
          <small>카드 추천 챗봇</small>
        </span>
      </button>
    </nav>
    <div class="sidebar-foot">
      <span class="date" id="todayLabel"></span>
    </div>
  </aside>

  <main id="main"></main>
</div>

<script src="app.js"></script>
<script src="ui.js"></script>
</body>
</html>
